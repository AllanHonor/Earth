<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Holographic Earth</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
            color: #0ff; user-select: none;
        }
        canvas { 
            display: block; 
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        #ui-layer { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
            opacity: 0; transition: opacity 2s ease-in;
        }
        .hud-panel { 
            position: absolute; padding: 25px; 
            border: 1px solid rgba(0, 255, 255, 0.2); 
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(0,20,30,0.4), rgba(0,10,15,0.6));
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.05), 0 0 15px rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            transition: transform 0.1s ease-out;
            pointer-events: auto;
        }
        .top-left { 
            top: 40px; left: 40px; 
            animation: slideInLeft 1.5s ease-out forwards;
        }
        .bottom-right { 
            bottom: 40px; right: 40px; 
            animation: slideInRight 1.5s ease-out forwards;
        }
        .bottom-left { 
            bottom: 40px; left: 40px; 
            width: 320px;
            animation: slideInUp 1.5s ease-out forwards;
        }
        
        @keyframes slideInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 { 
            margin: 0 0 15px 0; font-size: 28px; color: #fff; 
            letter-spacing: 6px; text-shadow: 0 0 10px #0ff; 
            font-weight: normal;
        }
        h2 { 
            margin: 0 0 10px 0; font-size: 16px; color: #0ff; 
            letter-spacing: 2px; border-bottom: 1px solid rgba(0,255,255,0.3);
            padding-bottom: 5px;
        }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 10px; font-size: 14px; color: #ddd; letter-spacing: 1px; }
        .label { color: #0ff; display: inline-block; width: 110px; font-weight: bold; }
        
        .btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin: 5px 5px 0 0;
            display: inline-block;
        }
        .btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px #0ff;
        }
        .btn.active {
            background: #0ff;
            color: #000;
        }

        .scanlines { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: linear-gradient(to bottom, transparent 50%, rgba(0,255,255,0.03) 51%); 
            background-size: 100% 4px; 
            pointer-events: none;
            animation: scan 10s linear infinite;
        }
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100vh; }
        }
        
        .vignette { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9); 
            pointer-events: none; 
        }
        
        #loading { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            color: #0ff; font-size: 22px; letter-spacing: 4px; 
            text-shadow: 0 0 10px #0ff;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        #console-text {
            font-size: 12px; color: #88ff88; line-height: 1.6;
            height: 100px; overflow: hidden;
            text-shadow: 0 0 5px rgba(136, 255, 136, 0.5);
        }
        
        .corner-bracket {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid #0ff;
        }
        .cb-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .cb-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .cb-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .cb-br { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        
        @media (max-width: 768px) {
            .hud-panel { padding: 15px; }
            h1 { font-size: 18px; }
            h2 { font-size: 14px; }
            li { font-size: 11px; margin-bottom: 6px;}
            .label { width: 80px; }
            .top-left { top: 10px; left: 10px; }
            .bottom-right { bottom: 10px; right: 10px; }
            .bottom-left { bottom: 10px; left: 10px; width: 220px; }
        }
    </style>
</head>
<body>
    <div id="loading">INITIALIZING SYSTEM...</div>
    <canvas id="globeCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="scanlines"></div>
        <div class="vignette"></div>

        <div class="hud-panel top-left">
            <div class="corner-bracket cb-tl"></div>
            <div class="corner-bracket cb-tr"></div>
            <div class="corner-bracket cb-bl"></div>
            <div class="corner-bracket cb-br"></div>
            <h1>EARTH_SYS</h1>
            <ul>
                <li><span class="label">STATUS:</span> <span id="sys-status" style="color:#0f0">NOMINAL</span></li>
                <li><span class="label">ZOOM:</span> <span id="zoom-val">1.0x</span></li>
                <li><span class="label">RADIUS:</span> 6,371 KM</li>
                <li><span class="label">MASS:</span> 5.972 × 10²⁴ KG</li>
                <li><span class="label">COORDS:</span> <span id="coord-val" style="color:#88ff88">0.0, 0.0</span></li>
            </ul>
        </div>
        
        <div class="hud-panel bottom-right">
            <div class="corner-bracket cb-tl"></div>
            <div class="corner-bracket cb-tr"></div>
            <div class="corner-bracket cb-bl"></div>
            <div class="corner-bracket cb-br"></div>
            <h2>ENVIRONMENT</h2>
            <ul>
                <li><span class="label">POPULATION:</span> 8.1B+</li>
                <li><span class="label">SURFACE:</span> 71% H₂O</li>
                <li><span class="label">GRAVITY:</span> 9.807 m/s²</li>
                <li><div style="margin-top:10px; font-size:10px;">SCANNING...</div>
                    <div style="width:100%; height:4px; background:rgba(0,255,255,0.1); margin-top:4px;">
                        <div id="scan-bar" style="width:40%; height:100%; background:#0ff; box-shadow:0 0 10px #0ff;"></div>
                    </div>
                </li>
            </ul>
        </div>

        <div class="hud-panel bottom-left">
            <div class="corner-bracket cb-tl"></div>
            <div class="corner-bracket cb-tr"></div>
            <div class="corner-bracket cb-bl"></div>
            <div class="corner-bracket cb-br"></div>
            <h2>TERMINAL</h2>
            <div id="console-text"></div>
            <div style="margin-top: 15px; border-top: 1px solid rgba(0,255,255,0.2); padding-top: 10px;">
                <div class="btn active" id="toggle-stars">STARS</div>
                <div class="btn active" id="toggle-sats">SATS</div>
                <div class="btn active" id="toggle-labels">LABELS</div>
                <div class="btn" id="manual-scan">MANUAL SCAN</div>
            </div>
        </div>
    </div>

c96mV+hUbdSvcW8kG3emM96hq/fX/wBrQDYFOOQOlUdpoje2ona+hfGj6kw4sLnpn/Vmp08O6q8JlFjLjPt/jXpv2psf6pqb9qkPSI/lU87DlR5PJZXUZIe2mBHXKGmraXD42W8zZ6YQ816yZ5COV49CKUSycYGAOgAp84cp5bbWt7DLlbWXcwKYZCDz6Z71PHoV5JMYvKlMm3dtVOSPxIr0eSWVv4c49qYjTCYOE6DGD0pcwcpxo8Iz7TuYKzHCBm56elZ95obWknlmUyyZxiNCQPqe1eh/vfMLqm0n6U8FiSzRjJ4JC9aOZj5UebX2hXlicSRlyRkbBmhfD+ptGkn2OTy3IAIwT+VelF2zna3pSbjnIVs+5o52HKea/wBgaltJNpL7YXOanh8M6hPCzJCQwbHz4T69TXoTM7DHzD6UKXVcYJx680c7DlPPrnwvfW1q0ztExU4KISTj16VSbR9QVGf7JKyL1ZRkD8q9PBbuCfbFOLsRgLgUc7DlPLItMvJchbaUtjIAjPNEml30e0PaTjf90bDzXqLFiBlQ2OmaWKZkPMTFvWnzi5T/2Q==";

        const canvas = document.getElementById('globeCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const uiLayer = document.getElementById('ui-layer');
        const loading = document.getElementById('loading');

        let R = Math.min(width, height) * 0.35;
        const numParticles = 15000; // Increased for better detail
        const numSatellites = 12;
        let stars = [];
        let shootingStars = [];
        let lastShootingStarTime = 0;

        let rotX = -0.3;
        let rotY = 0;
        let targetRotX = -0.3;
        let targetRotY = 0;
        let zoom = 1;
        let targetZoom = 1;
        let isDragging = false;
        let isPaused = false;
        let previousMouse = { x: 0, y: 0 };
        let mousePos = { x: 0, y: 0 }; // Current mouse position
        let autoRotateSpeed = 0.002;

        let showStars = true;
        let showSats = true;
        let showLabels = true;
        let manualScanY = -1;

        let sonarPulse = { active: false, x: 0, y: 0, radius: 0, maxRadius: 300 };

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            targetZoom -= e.deltaY * 0.001;
            targetZoom = Math.min(Math.max(targetZoom, 0.5), 3.0);
        }, { passive: false });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            R = Math.min(width, height) * 0.35;
            updateGradients();
        });

        let sunGrad, atmosphereGrad;
        function updateGradients() {
            const cx = width * 0.5, cy = height * 0.5;
            const sunX = width * 0.7, sunY = height * 0.3;
            sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, width * 0.5);
            sunGrad.addColorStop(0, 'rgba(0, 150, 255, 0.15)');
            sunGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');

            // Atmosphere is drawn with ctx.translate(cx, cy), so center at (0, 0)
            atmosphereGrad = ctx.createRadialGradient(0, 0, R * 0.7, 0, 0, R * 1.3);
            atmosphereGrad.addColorStop(0, 'rgba(0, 50, 100, 0.6)');
            atmosphereGrad.addColorStop(0.5, 'rgba(0, 100, 255, 0.2)');
            atmosphereGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        }

        // Mouse interactions
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMouse = { x: e.clientX, y: e.clientY };

            // Trigger Sonar Pulse on click
            sonarPulse.active = true;
            sonarPulse.radius = 0;
            sonarPulse.x = e.clientX;
            sonarPulse.y = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
            if (isDragging) {
                const deltaX = e.clientX - previousMouse.x;
                const deltaY = e.clientY - previousMouse.y;
                targetRotY += deltaX * 0.004;
                targetRotX += deltaY * 0.004;
                previousMouse = { x: e.clientX, y: e.clientY };
            } else {
                const mouseX = (e.clientX / width) * 2 - 1;
                const mouseY = (e.clientY / height) * 2 - 1;
                targetRotX = -0.3 + mouseY * 0.15;
                autoRotateSpeed = 0.002 + mouseX * 0.003;
            }
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mouseleave', () => isDragging = false);

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });
        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const deltaX = e.touches[0].clientX - previousMouse.x;
                const deltaY = e.touches[0].clientY - previousMouse.y;
                targetRotY += deltaX * 0.005;
                targetRotX += deltaY * 0.005;
                previousMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        });
        window.addEventListener('touchend', () => isDragging = false);

        function initStars() {
            for (let i = 0; i < 600; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5,
                    alpha: Math.random(),
                    speed: (Math.random() * 0.02) + 0.005
                });
            }
        }

        function spawnShootingStar() {
            const side = Math.random() > 0.5;
            shootingStars.push({
                x: side ? -50 : width + 50,
                y: Math.random() * height * 0.5,
                vx: (side ? 1 : -1) * (15 + Math.random() * 10),
                vy: 5 + Math.random() * 5,
                len: 40 + Math.random() * 60,
                opacity: 1
            });
        }

        function drawShootingStars() {
            const now = Date.now();
            if (now - lastShootingStarTime > 30000) { // Every 30s
                spawnShootingStar();
                lastShootingStarTime = now;
            }

            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const s = shootingStars[i];
                s.x += s.vx;
                s.y += s.vy;
                s.opacity -= 0.01;

                if (s.opacity <= 0) {
                    shootingStars.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = s.opacity;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.vx * 2, s.y - s.vy * 2);
                ctx.stroke();

                // Glow
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
                ctx.lineWidth = 6;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
        }

        function drawStars() {
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                s.alpha += s.speed;
                if (s.alpha > 1) { s.alpha = 1; s.speed = -s.speed; }
                else if (s.alpha < 0) { s.alpha = 0; s.speed = -s.speed; }
                ctx.globalAlpha = s.alpha;
                ctx.fillStyle = i % 20 === 0 ? '#aaf' : '#fff'; // Some blueish stars
                ctx.fillRect(s.x, s.y, s.size, s.size);

                if (i % 50 === 0 && s.alpha > 0.5) { // Occasional glow
                    ctx.globalAlpha = s.alpha * 0.2;
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
            drawShootingStars();
        }

        function drawSatellites(cx, cy, cosX, sinX, cosY, sinY, focalLength, currentR) {
            ctx.lineWidth = 1;
            for (let i = 0; i < numSatellites; i++) {
                satTheta[i] += satSpeed[i];
                const orbit = satOrbit[i];
                const phi = satPhi[i];
                const theta = satTheta[i];
                const tilt = satTilt[i];

                let sx = Math.sin(phi) * Math.cos(theta) * orbit;
                let sy = Math.cos(phi) * orbit;
                let sz = Math.sin(phi) * Math.sin(theta) * orbit;

                const ty = sy * Math.cos(tilt) - sz * Math.sin(tilt);
                const tz = sz * Math.cos(tilt) + sy * Math.sin(tilt);
                sy = ty; sz = tz;

                const x1 = sx * cosY - sz * sinY;
                const z1 = sz * cosY + sx * sinY;
                const y2 = sy * cosX - z1 * sinX;
                const z2 = z1 * cosX + sy * sinX;

                const scale = focalLength / (focalLength + z2 * currentR);
                const sR = scale * currentR;
                const px = cx + x1 * sR;
                const py = cy + y2 * sR;

                if (z2 < 0) {
                    ctx.globalAlpha = 0.8;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(px - 1.5, py - 1.5, 3, 3);

                    // Orbit trail
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
                    ctx.arc(cx, cy, orbit * sR, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        // Optimized Particle Storage
        const pX = new Float32Array(numParticles);
        const pY = new Float32Array(numParticles);
        const pZ = new Float32Array(numParticles);
        const pOrigX = new Float32Array(numParticles);
        const pOrigY = new Float32Array(numParticles);
        const pOrigZ = new Float32Array(numParticles);
        const pVX = new Float32Array(numParticles); // Velocity X
        const pVY = new Float32Array(numParticles); // Velocity Y
        const pVZ = new Float32Array(numParticles); // Velocity Z
        const pColorBase = new Array(numParticles);
        const pIsLand = new Uint8Array(numParticles);
        const pIsCity = new Uint8Array(numParticles);

        // Satellites
        const satOrbit = new Float32Array(numSatellites);
        const satSpeed = new Float32Array(numSatellites);
        const satPhi = new Float32Array(numSatellites);
        const satTheta = new Float32Array(numSatellites);
        const satTilt = new Float32Array(numSatellites);

        const poi = [
            { name: "NEOM", lat: 28.5, lon: 35.0 },
            { name: "SILICON_VALLEY", lat: 37.4, lon: -122.0 },
            { name: "TOKYO_HUB", lat: 35.7, lon: 139.7 },
            { name: "LONDON_NODE", lat: 51.5, lon: -0.1 }
        ];

        // Load map and initialize
        const img = new Image();
        img.onload = () => {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            const imgW = offCanvas.width = img.width;
            const imgH = offCanvas.height = img.height;
            offCtx.drawImage(img, 0, 0);
            const imgData = offCtx.getImageData(0, 0, imgW, imgH).data;

            for(let i = 0; i < numParticles; i++) {
                const phi = Math.acos(1 - 2 * (i + 0.5) / numParticles);
                const theta = Math.PI * (1 + Math.sqrt(5)) * i;

                pOrigX[i] = pX[i] = Math.sin(phi) * Math.cos(theta);
                pOrigY[i] = pY[i] = Math.cos(phi);
                pOrigZ[i] = pZ[i] = Math.sin(phi) * Math.sin(theta);

                let u = (theta % (2 * Math.PI)) / (2 * Math.PI);
                if (u < 0) u += 1;
                let v = phi / Math.PI;

                const px = Math.floor(u * (imgW - 1));
                const py = Math.floor(v * (imgH - 1));
                const idx = (py * imgW + px) * 4;

                const r = imgData[idx], g = imgData[idx+1], b = imgData[idx+2];
                const brightness = (r + g + b) / 3;

                // Color Palette: Deep blues, cyans, and highlights
                const isLand = brightness > 50;
                pIsLand[i] = isLand ? 1 : 0;

                // City lights logic: If ocean and small chance, or land edge
                if (!isLand && Math.random() > 0.995) {
                    pIsCity[i] = 1;
                    pColorBase[i] = `rgb(255, 200, 50)`; // Gold
                } else if (isLand) {
                    const mix = 0.6;
                    const colR = (r * (1 - mix) + 0 * mix) | 0;
                    const colG = (g * (1 - mix) + 200 * mix) | 0;
                    const colB = (b * (1 - mix) + 255 * mix) | 0;
                    pColorBase[i] = `rgb(${colR},${colG},${colB})`;
                } else {
                    pColorBase[i] = `rgb(0, 20, 60)`; // Deep Blue Ocean
                }
            }

            // Init Satellites
            for (let i = 0; i < numSatellites; i++) {
                satOrbit[i] = 1.2 + Math.random() * 0.4;
                satSpeed[i] = (Math.random() - 0.5) * 0.02;
                satPhi[i] = Math.random() * Math.PI;
                satTheta[i] = Math.random() * Math.PI * 2;
                satTilt[i] = (Math.random() - 0.5) * 0.5;
            }

            loading.style.display = 'none';
            uiLayer.style.opacity = '1';
            updateGradients();
            initStars();
            startTerminal();
            requestAnimationFrame(render);
        };
        img.src = earthBase64;

        const ringPoints = new Float32Array(162);
        for (let i = 0; i <= 80; i++) {
            const a = (i / 80) * 6.283185;
            ringPoints[i*2] = Math.cos(a);
            ringPoints[i*2+1] = Math.sin(a);
        }

        function drawRing(radius, yOffset, cx, cy, cosX, sinX, cosY, sinY, focalLength, currentR) {
            ctx.beginPath();
            let isFirst = true;
            for (let i = 0; i <= 80; i++) {
                const ox = ringPoints[i*2] * radius;
                const oz = ringPoints[i*2+1] * radius;
                const x1 = ox * cosY - oz * sinY;
                const z1 = oz * cosY + ox * sinY;
                const y2 = yOffset * cosX - z1 * sinX;
                const z2 = z1 * cosX + yOffset * sinX;

                if (z2 > 0.1) { isFirst = true; continue; }

                const sR = (focalLength / (focalLength + z2 * currentR)) * currentR;
                if (isFirst) { ctx.moveTo(cx + x1 * sR, cy + y2 * sR); isFirst = false; }
                else { ctx.lineTo(cx + x1 * sR, cy + y2 * sR); }
            }
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.25)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        const zoomEl = document.getElementById('zoom-val');
        const coordEl = document.getElementById('coord-val');
        const scanBar = document.getElementById('scan-bar');
        const sysStatus = document.getElementById('sys-status');
        let scanProgress = 0;
        let isOverload = false;

        // Hidden Secret 1: "BOLT" Keyboard Sequence
        let inputBuffer = "";
        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            inputBuffer = (inputBuffer + key).slice(-4);
            if (inputBuffer === "BOLT") {
                triggerSecretMode();
            }

            // Keyboard Shortcuts
            if (e.code === "Space") {
                e.preventDefault();
                isPaused = !isPaused;
                sysStatus.textContent = isPaused ? "SYSTEM_PAUSED" : (isOverload ? "OVERLOAD" : "NOMINAL");
                sysStatus.style.color = isPaused ? "#f80" : (isOverload ? "#f0f" : "#0f0");
            }
            if (key === "R") {
                targetRotX = -0.3;
                targetZoom = 1.0;
            }
            if (key === "S") {
                manualScanY = 0;
            }
        });

        function triggerSecretMode() {
            autoRotateSpeed = 0.05;
            targetZoom = 2.5;
            sysStatus.textContent = "BOLT_MODE_ACTIVE";
            sysStatus.style.color = "#ff0";
            setTimeout(() => {
                autoRotateSpeed = 0.002;
                targetZoom = 1.0;
                sysStatus.textContent = "NOMINAL";
                sysStatus.style.color = "#0f0";
            }, 3000);
        }

        // Hidden Secret 2: HUD Overload Toggle
        sysStatus.style.pointerEvents = "auto";
        sysStatus.style.cursor = "help";
        sysStatus.addEventListener('click', () => {
            isOverload = !isOverload;
            sysStatus.textContent = isOverload ? "OVERLOAD" : "NOMINAL";
            sysStatus.style.color = isOverload ? "#f0f" : "#0f0";
            if (isOverload) {
                document.body.style.filter = "hue-rotate(90deg) contrast(1.5)";
            } else {
                document.body.style.filter = "none";
            }
        });

        const hudPanels = []; // Cache panels
        function render() {
            if (hudPanels.length === 0) {
                document.querySelectorAll('.hud-panel').forEach(p => hudPanels.push(p));
            }
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            if (showStars) drawStars();

            // Draw Sonar Pulse
            if (sonarPulse.active) {
                sonarPulse.radius += 10;
                if (sonarPulse.radius > sonarPulse.maxRadius) {
                    sonarPulse.active = false;
                } else {
                    ctx.beginPath();
                    ctx.arc(sonarPulse.x, sonarPulse.y, sonarPulse.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 255, 255, ${1 - sonarPulse.radius / sonarPulse.maxRadius})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            ctx.fillStyle = sunGrad;
            ctx.fillRect(0, 0, width, height);

            if (!isDragging && !isPaused) targetRotY -= autoRotateSpeed;
            rotX += (targetRotX - rotX) * 0.1;
            rotY += (targetRotY - rotY) * 0.1;
            zoom += (targetZoom - zoom) * 0.1;

            // Update UI periodically (avoiding every frame for performance)
            if (Math.random() < 0.1) {
                zoomEl.textContent = zoom.toFixed(2) + 'x';
                const lat = (rotX * (180 / Math.PI)).toFixed(1);
                const lon = ((-rotY % (Math.PI * 2)) * (180 / Math.PI)).toFixed(1);
                coordEl.textContent = `${lat}, ${lon}`;
                scanProgress = (scanProgress + (isOverload ? 5 : 1)) % 100;
                scanBar.style.width = scanProgress + '%';
            }

            // Iron Man AR HUD Tilt Effect (Smooth)
            const tiltX = (mousePos.y / height - 0.5) * 20;
            const tiltY = (mousePos.x / width - 0.5) * -20;
            const tiltTransform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateZ(20px)`;
            for (let i = 0; i < hudPanels.length; i++) {
                hudPanels[i].style.transform = tiltTransform;
            }

            if (targetRotX > 1.25) targetRotX = 1.25;
            if (targetRotX < -1.25) targetRotX = -1.25;

            const currentR = R * zoom;
            const cx = width * 0.5, cy = height * 0.5, focalLength = width;

            // Atmosphere scales with zoom
            ctx.fillStyle = atmosphereGrad;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(zoom, zoom);
            ctx.fillRect(-R * 1.5, -R * 1.5, R * 3, R * 3);
            ctx.restore();

            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);

            drawRing(1.15, 0, cx, cy, cosX, sinX, cosY, sinY, focalLength, currentR);
            drawRing(1.4, 0, cx, cy, cosX, sinX, cosY, sinY, focalLength, currentR);

            if (showSats) drawSatellites(cx, cy, cosX, sinX, cosY, sinY, focalLength, currentR);

            // Manual Scan Effect
            if (manualScanY !== -1) {
                ctx.beginPath();
                ctx.moveTo(0, manualScanY);
                ctx.lineTo(width, manualScanY);
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Scan bloom
                ctx.fillStyle = 'rgba(0, 255, 255, 0.05)';
                ctx.fillRect(0, manualScanY - 50, width, 100);

                manualScanY += 15;
                if (manualScanY > height) manualScanY = -1;
            }

            // Draw POI Labels (Iron Man Style)
            if (showLabels) {
                ctx.font = '10px Courier New';
                ctx.textAlign = 'left';
                poi.forEach(p => {
                const phi = (90 - p.lat) * (Math.PI / 180);
                const theta = (p.lon + 180) * (Math.PI / 180) + rotY;

                const px = Math.sin(phi) * Math.cos(theta);
                const py = Math.cos(phi);
                const pz = Math.sin(phi) * Math.sin(theta);

                const x1 = px;
                const z1 = pz;
                const y2 = py * cosX - z1 * sinX;
                const z2 = z1 * cosX + py * sinX;

                if (z2 < 0) {
                    const scale = focalLength / (focalLength + z2 * currentR);
                    const sR = scale * currentR;
                    const screenX = cx + x1 * sR;
                    const screenY = cy + y2 * sR;

                    // Hologram flicker
                    ctx.globalAlpha = (Math.min(1, -z2 + 0.2)) * (Math.random() > 0.98 ? 0.3 : 1.0);
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, 3, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = '#0ff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(screenX, screenY);
                    ctx.lineTo(screenX + 20, screenY - 20);
                    ctx.stroke();

                    ctx.fillText(p.name, screenX + 25, screenY - 20);
                }
            });
            }

            let lastAlpha = -1, lastFill = '';
            for (let i = 0; i < numParticles; i++) {
                // Rotation & Projection (Pre-move)
                let x1 = pX[i] * cosY - pZ[i] * sinY;
                let z1 = pZ[i] * cosY + pX[i] * sinY;
                let y2 = pY[i] * cosX - z1 * sinX;
                let z2 = z1 * cosX + pY[i] * sinX;

                let scale = focalLength / (focalLength + z2 * currentR);
                let sR = scale * currentR;
                let screenX = cx + x1 * sR;
                let screenY = cy + y2 * sR;

                // Mouse Interaction: Repulsion
                const dx = mousePos.x - screenX;
                const dy = mousePos.y - screenY;
                const distSq = dx * dx + dy * dy;
                if (distSq < 10000) { // 100px radius
                    const force = (1 - Math.sqrt(distSq) / 100) * 0.05;
                    pVX[i] -= (dx / 100) * force;
                    pVY[i] -= (dy / 100) * force;
                }

                // Sonar Pulse Reaction
                if (sonarPulse.active) {
                    const dxS = sonarPulse.x - screenX;
                    const dyS = sonarPulse.y - screenY;
                    const distS = Math.sqrt(dxS * dxS + dyS * dyS);
                    if (Math.abs(distS - sonarPulse.radius) < 20) {
                        const force = 0.1;
                        pVX[i] -= (dxS / distS) * force;
                        pVY[i] -= (dyS / distS) * force;
                    }
                }

                // Apply velocities & Spring back
                pX[i] += pVX[i];
                pY[i] += pVY[i];
                pZ[i] += pVZ[i];

                pVX[i] = (pVX[i] + (pOrigX[i] - pX[i]) * 0.05) * 0.9;
                pVY[i] = (pVY[i] + (pOrigY[i] - pY[i]) * 0.05) * 0.9;
                pVZ[i] = (pVZ[i] + (pOrigZ[i] - pZ[i]) * 0.05) * 0.9;

                // Re-calculate projection after move for draw
                x1 = pX[i] * cosY - pZ[i] * sinY;
                z1 = pZ[i] * cosY + pX[i] * sinY;
                y2 = pY[i] * cosX - z1 * sinX;
                z2 = z1 * cosX + pY[i] * sinX;

                scale = focalLength / (focalLength + z2 * currentR);
                sR = scale * currentR;

                let alpha, size;
                if (z2 > 0) {
                    alpha = 0.05;
                    size = scale * 0.5 * zoom;
                } else {
                    const baseAlpha = pIsLand[i] ? 0.9 : 0.15;
                    alpha = Math.min(1, -z2 + 0.1) * baseAlpha;
                    size = scale * (pIsLand[i] ? 1.3 : 0.6) * zoom;

                    if (pIsCity[i]) {
                        alpha = Math.min(1, -z2 + 0.5);
                        size *= 1.5;
                    }
                }

                if (alpha !== lastAlpha) ctx.globalAlpha = lastAlpha = alpha;
                if (pColorBase[i] !== lastFill) ctx.fillStyle = lastFill = pColorBase[i];
                ctx.fillRect(cx + x1 * sR, cy + y2 * sR, size, size);

                // City light bloom
                if (pIsCity[i] && z2 < 0 && Math.random() > 0.8) {
                    ctx.globalAlpha = alpha * 0.3;
                    ctx.fillRect(cx + x1 * sR - size, cy + y2 * sR - size, size * 3, size * 3);
                    lastAlpha = -1; // Reset tracker because we modified globalAlpha without updating it
                }
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(render);
        }

        // Terminal animation
        function startTerminal() {
            const consoleLines = [
                "UPLINK ESTABLISHED.",
                "INITIALIZING GEO-SCAN...",
                "MAPPING CONTINENTAL DRIFT...",
                "DETECTING ATMOSPHERIC COMPOSITION...",
                "ANALYZING BIOMES...",
                "SYNCHRONIZING ORBITAL DATA...",
                "CALCULATING TRAJECTORY...",
                "DATA STREAM STABLE."
            ];
            const consoleDiv = document.getElementById('console-text');
            let lineIdx = 0;
            let currentLines = [];

            // Button Event Listeners
            document.getElementById('toggle-stars').addEventListener('click', function() {
                showStars = !showStars;
                this.classList.toggle('active');
            });
            document.getElementById('toggle-sats').addEventListener('click', function() {
                showSats = !showSats;
                this.classList.toggle('active');
            });
            document.getElementById('toggle-labels').addEventListener('click', function() {
                showLabels = !showLabels;
                this.classList.toggle('active');
            });
            document.getElementById('manual-scan').addEventListener('click', function() {
                manualScanY = 0;
            });

            setInterval(() => {
                if (lineIdx < consoleLines.length) {
                    currentLines.push("> " + consoleLines[lineIdx]);
                    if(currentLines.length > 5) currentLines.shift();
                    consoleDiv.innerHTML = currentLines.join('<br>');
                    lineIdx++;
                } else {
                    currentLines.push("> AWAITING COMMAND...");
                    if(currentLines.length > 5) currentLines.shift();
                    consoleDiv.innerHTML = currentLines.join('<br>');
                    lineIdx = 0; // Restart loop for effect
                    currentLines = [];
                }
            }, 1500);
        }
    </script>
</body>
